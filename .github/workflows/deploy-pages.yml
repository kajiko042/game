name: Enable GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  enable-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Enable GitHub Pages via REST API
        run: |
          echo "Enabling GitHub Pages for ${{ github.repository }}..."
          HTTP_CODE=$(curl -s -o /tmp/pages_response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"source":{"branch":"gh-pages","path":"/"}}')
          echo "HTTP Status: $HTTP_CODE"
          cat /tmp/pages_response.json
          if [ "$HTTP_CODE" = "201" ]; then
            echo "SUCCESS: GitHub Pages enabled!"
            echo "Game URL: https://kajiko042.github.io/game/"
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "GitHub Pages already enabled."
            echo "Game URL: https://kajiko042.github.io/game/"
          else
            echo "Error: Status $HTTP_CODE"
            exit 1
          fi
